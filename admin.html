<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fff1f6" />
    <meta name="robots" content="noindex,nofollow" />
    <title>宝宝专属照顾员工作台</title>
    <link rel="icon" href="assets/images/heart-cloud.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body class="page-admin">
    <main class="admin-shell">
      <section class="admin-login" id="loginPanel" aria-labelledby="loginTitle">
        <div class="mini-art" aria-hidden="true">🔐</div>
        <p class="eyebrow">PRIVATE ENTRANCE</p>
        <h1 id="loginTitle">张先森专属入口</h1>
        <p class="sublead">先确认一下是不是本人。</p>
        <form id="loginForm" class="login-form">
          <label>
            <span class="sr-only">请输入密码</span>
            <input id="passwordInput" type="password" autocomplete="current-password" required placeholder="请输入密码" />
          </label>
          <p class="field-error" id="loginError" aria-live="polite"></p>
          <button class="button button-primary button-large" id="loginButton" type="submit">进入工作台</button>
        </form>
      </section>

      <section class="workspace" id="workspacePanel" aria-labelledby="workspaceTitle" hidden>
        <header class="workspace-header">
          <div>
            <p class="eyebrow">CARETAKER DESK</p>
            <h1 id="workspaceTitle">宝宝专属照顾员工作台</h1>
            <p>看看赵小萱宝宝今天记录了什么。</p>
          </div>
          <a class="text-link" href="history.html">最近七天记录 →</a>
        </header>

        <div class="admin-grid">
          <section class="admin-card today-card" aria-labelledby="todayTitle">
            <div class="card-heading">
              <div>
                <p class="card-kicker" id="todayDate"></p>
                <h2 id="todayTitle">今日记录</h2>
              </div>
              <span class="status-badge" id="adminViewBadge" hidden></span>
            </div>

            <div id="loadingRecord" class="empty-state">正在读取今天的记录……</div>
            <div id="emptyRecord" class="empty-state" hidden>赵小萱宝宝今天还没有提交记录。</div>
            <div id="todayRecord" hidden>
              <dl class="record-list record-list-admin">
                <div><dt>今天心情：</dt><dd id="todayMood"></dd></div>
                <div><dt>身体感觉：</dt><dd id="todayBody"></dd></div>
                <div><dt>今天想要：</dt><dd id="todayNeeds"></dd></div>
                <div><dt>她想说：</dt><dd id="todayMessage"></dd></div>
                <div><dt>提交时间：</dt><dd id="todaySubmittedAt"></dd></div>
              </dl>
              <p class="field-error" id="viewError" aria-live="polite"></p>
              <button class="button button-primary" id="markViewedButton" type="button">我看到啦</button>
              <p class="success-message" id="viewSuccess" aria-live="polite" hidden>已经告诉赵小萱宝宝，张先森看到了。</p>
            </div>
          </section>

          <aside class="admin-card reminder-card" aria-labelledby="reminderTitle">
            <div class="reminder-icon" aria-hidden="true">💗</div>
            <h2 id="reminderTitle">今天记得</h2>
            <div id="reminderList" class="reminder-list">
              <p>等赵小萱宝宝提交记录后，这里会出现小提醒。</p>
            </div>
          </aside>
        </div>
      </section>
    </main>

    <script src="assets/js/config.js"></script>
    <script type="module" src="assets/js/admin.js"></script>
  </body>
</html>
